apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-downstream-apis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              until nc -z reservations-api 8080 && nc -z customers-api 8080 && nc -z maintenance-api 8080 && nc -z vehicleinventory-api 8080; do 
                echo "Waiting for downstream APIs to start..."; 
                sleep 2; 
              done;
      containers:
        - name: api-gateway
          image: distributed-applications-final-assignment-api-gateway:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "1Gi"
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ReverseProxy__Clusters__maintenance-cluster__Destinations__destination1__Address
              value: http://maintenance-api:8080
            - name: ReverseProxy__Clusters__car-rental-customer-cluster__Destinations__destination1__Address
              value: http://customers-api:8080
            - name: ReverseProxy__Clusters__vehicleinventory-cluster__Destinations__destination1__Address
              value: http://vehicleinventory-api:8080
            - name: ReverseProxy__Clusters__reservations-cluster__Destinations__destination1__Address
              value: http://reservations-api:8080
              
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3